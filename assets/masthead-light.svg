<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 205" width="880" height="205" role="img" aria-label="Morningstar — documenting a C++ education, one problem at a time.">
  <defs>
    <style>
      .paper  { fill: #FBF9F6; }
      .ink    { fill: #1F1D1A; }
      .muted  { fill: #6B6459; }
      .accent { fill: #A6543A; }
      .rule-h { stroke: #1F1D1A; }
      .rule-l { stroke: #DDD5C8; }
      .serif  { font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', Palatino, 'Times New Roman', Times, serif; }
      .sans   { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="paper" x="0" y="0" width="880" height="205"/>

  <!-- top double rule -->
  <line class="rule-h" x1="40" y1="22" x2="840" y2="22" stroke-width="2.5"/>
  <line class="rule-h" x1="40" y1="28" x2="840" y2="28" stroke-width="0.75"/>

  <!-- kicker -->
  <text class="sans muted" x="40"  y="51" font-size="10.5" letter-spacing="2.6">EST. MMXXVI</text>
  <text class="sans accent" x="440" y="51" font-size="10.5" letter-spacing="2.6" text-anchor="middle">ISSUE NO. 01</text>
  <text class="sans muted" x="840" y="51" font-size="10.5" letter-spacing="2.6" text-anchor="end">C++ &#183; DSA</text>

  <!-- hairline with centre ornament -->
  <line class="rule-l" x1="40"  y1="66" x2="412" y2="66" stroke-width="0.75"/>
  <line class="rule-l" x1="468" y1="66" x2="840" y2="66" stroke-width="0.75"/>
  <rect class="accent" x="435" y="61" width="10" height="10" transform="rotate(45 440 66)"/>

  <!-- masthead -->
  <text class="serif ink" x="440" y="133" font-size="60" letter-spacing="2.5" text-anchor="middle">Morningstar</text>

  <!-- dek -->
  <text class="serif muted" x="440" y="163" font-size="14.5" font-style="italic" text-anchor="middle">Documenting a C++ education &#8212; one problem, one proof, at a time.</text>

  <!-- bottom double rule -->
  <line class="rule-l" x1="40" y1="184" x2="840" y2="184" stroke-width="0.75"/>
  <line class="rule-h" x1="40" y1="190" x2="840" y2="190" stroke-width="2.5"/>
</svg>
